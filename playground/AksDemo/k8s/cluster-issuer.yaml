# Let's Encrypt ClusterIssuers using the HTTP-01 challenge through the
# storefront-gw Gateway. cert-manager will create a temporary HTTPRoute on the
# referenced gateway when it needs to satisfy a challenge, so the gateway must
# already have a port 80 listener (which the AppHost configures).
#
# Replace REPLACE_ME@example.com with a real contact email before applying.
# Start with the staging issuer; switch to the prod issuer only once everything
# works end-to-end so you don't burn through Let's Encrypt's prod rate limits.
#
# Apply:
#   kubectl apply -f cluster-issuer.yaml
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: REPLACE_ME@example.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: storefront-gw
                namespace: default
                kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: REPLACE_ME@example.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: storefront-gw
                namespace: default
                kind: Gateway
